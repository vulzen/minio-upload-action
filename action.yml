name: 'Upload to MinIO'
description: 'Upload artifacts to MinIO object storage'
author: 'vulzen'

inputs:
  endpoint:
    description: 'MinIO endpoint URL (e.g., play.min.io:9000)'
    required: true
  access-key:
    description: 'MinIO access key'
    required: true
  secret-key:
    description: 'MinIO secret key'
    required: true
  bucket:
    description: 'Target bucket name'
    required: true
  source:
    description: 'Source file or directory path to upload. Supports multiple sources using YAML multiline syntax (one path per line)'
    required: true
  target:
    description: 'Target path prefix in bucket where all sources will be uploaded (optional)'
    required: false
    default: ''
  use-ssl:
    description: 'Use SSL/TLS for connection'
    required: false
    default: 'true'
  flatten:
    description: 'Upload every matched file to target/<basename> instead of preserving its directory structure. Off by default.'
    required: false
    default: 'false'
  region:
    description: 'MinIO region (optional)'
    required: false
    default: 'us-east-1'

outputs:
  uploads:
    description: 'JSON array of all uploaded files with their paths and ETags'
    value: ${{ steps.upload.outputs.uploads }}
  uploaded-count:
    description: 'Total number of files uploaded'
    value: ${{ steps.upload.outputs.uploaded-count }}
  uploaded-paths:
    description: 'Newline-separated list of all uploaded file paths'
    value: ${{ steps.upload.outputs.uploaded-paths }}

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'upload-cloud'
  color: 'red'
